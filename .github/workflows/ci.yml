name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  parser:
    name: parser — tests + coverage gate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: geml-parser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Test suite + coverage thresholds
        run: npm run coverage:check

  viewer:
    name: viewer — build + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build the reference parser (the viewer imports its dist/)
        working-directory: geml-parser
        run: npm install && npm run build
      - name: Viewer build + tests
        working-directory: geml-viewer
        run: npm install && npm test
